<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
</head>
<body>

<h2>Student Dashboard</h2>

{% for subject in subjects %}

<h3>{{ subject[1] }}</h3>

<ul>
{% for file in subject_files[subject[0]] %}
    <li>
        <a href="{{ url_for('static', filename='uploads/' + file[2]) }}" target="_blank">
            Download {{ file[2] }}
        </a>
    </li>
{% endfor %}
</ul>

<hr>

{% endfor %}

<br>
<a href="/logout">Logout</a>

</body>
</html>
